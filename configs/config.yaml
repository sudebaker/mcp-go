server:
  host: "0.0.0.0"
  port: 8080
  name: "mcp-orchestrator"
  rate_limit_rps: 10
  rate_limit_burst: 20

execution:
  default_timeout: "60s"
  working_dir: "/data"
  environment:
    LLM_API_URL: "${LLM_API_URL:-http://localhost:11434}"
    LLM_MODEL: "${LLM_MODEL:-llama3}"
    DATABASE_URL: "${DATABASE_URL:-postgresql://mcp:mcp@localhost:5432/knowledge}"
    DB_POOL_MIN: "2"
    DB_POOL_MAX: "10"
    REDIS_URL: "${REDIS_URL:-redis://localhost:6379/0}"
    LLM_CACHE_TTL: "3600"
    PYTHONUNBUFFERED: "1"

tools:
  # Echo tool for testing
  - name: "echo"
    description: "Simply repeats the exact text provided. Exclusively for debugging or explicit text repetition, NOT for memorizing or storing information."
    command: "python3"
    args: ["/app/tools/echo/main.py"]
    timeout: "10s"
    input_schema:
      type: object
      properties:
        text:
          type: string
          description: "Text to echo back"
      required:
        - text

  # PDF Report Generation
  - name: "generate_report"
    description: "Generate professional PDF reports with company branding. Use this tool when user asks to: create report, generate PDF, make a report, export to PDF, create document, generate, write report invoice, make summary. Supports: incident reports, meeting minutes, audits, executive summaries, formal documents, corporate emails, and AI-generated content (pass markdown text). Returns PDF as base64 for display + download URL."
    command: "python3"
    args: ["/app/tools/pdf_reports/main.py"]
    timeout: "120s"
    input_schema:
      type: object
      properties:
        report_type:
          type: string
          enum: ["incident", "meeting", "audit", "executive_summary", "formal_report", "corporate_email", "llm_response"]
          description: "Type of report. Use 'llm_response' for AI-generated markdown content, 'executive_summary' for business summaries, 'formal_report' for formal documents."
        data:
          type: object
          description: "Report data object. For llm_response: {title, content (markdown), author, logo_url}. For others: see tool documentation."
        output_path:
          type: string
          description: "Optional output path for the PDF file"
      required:
        - report_type
        - data

  # Data Analysis
  - name: "analyze_data"
    description: "Analyze Excel/CSV data files with Python and Pandas. Use when user asks: analyze this file, process spreadsheet, calculate totals, generate charts, show trends, what are the numbers, sales data, financial data, make statistics, create visualization from data. Can also answer questions about the data like totals, averages, groupings. Returns analysis text, JSON, markdown tables, or chart images (PNG)."
    command: "python3"
    args: ["/app/tools/data_analysis/main.py"]
    timeout: "180s"
    input_schema:
      type: object
      properties:
        file_url:
          type: string
          description: "HTTP URL to the data file (presigned S3 URL or direct download link). Supports .xlsx, .xls, .csv"
        file_name:
          type: string
          description: "Original filename with extension (e.g., sales.xlsx) - required to determine file format"
        question:
          type: string
          description: "What to do with the data: 'calculate total sales', 'average price by category', 'show top 10 products', 'create bar chart of monthly revenue'"
        output_format:
          type: string
          enum: ["text", "json", "markdown", "png"]
          default: "text"
          description: "How to return results: 'text' (plain), 'json' (structured), 'markdown' (tables), 'png' (chart image)"
        __files__:
          type: array
          description: "Alternative: attach files directly in OpenWebUI. The tool will download them automatically."
          items:
            type: object
            properties:
              type:
                type: string
              url:
                type: string
              name:
                type: string
              id:
                type: string
      required:
        - question

  # Vision/OCR
  - name: "analyze_image"
    description: "Analyze images: extract text (OCR), describe what you see, detect objects/people/text, or answer questions about image content. Use when user asks: read this image, extract text from screenshot, what's in this photo, describe this picture, scan document, extract invoice data, recognize license plate. Supports screenshots, photos, scanned documents, diagrams."
    command: "python3"
    args: ["/app/tools/vision_ocr/main.py"]
    timeout: "120s"
    input_schema:
      type: object
      properties:
        image_path:
          type: string
          description: "URL or path to the image file. Supports JPEG, PNG, WebP, PDF pages"
        task:
          type: string
          enum: ["ocr", "describe", "extract_entities", "answer"]
          description: "Task type: 'ocr' (extract all text), 'describe' (natural language description), 'extract_entities' (detect specific items like names, dates, amounts), 'answer' (answer a specific question about the image)"
        question:
          type: string
          description: "Specific question for 'answer' task, or what to extract for 'extract_entities'. Example: 'What product is shown?' or 'Extract all dates and amounts'"
      required:
        - image_path
        - task

  # Knowledge Base - Ingest
  - name: "kb_ingest"
    description: "Stores and memorizes text content for future retrieval and semantic search. Use this when the user wants to 'memorize', 'save', 'remember', 'learn', 'store knowledge', or 'keep track of' information. Examples: 'Memoriza esto:', 'Guarda esta información:', 'Recuerda que:', 'Aprende sobre'."
    command: "python3"
    args: ["/app/tools/knowledge_base/main.py", "ingest"]
    timeout: "300s"
    input_schema:
      type: object
      properties:
        content:
          type: string
          description: "The text content to memorize and store in the knowledge base."
        collection:
          type: string
          default: "default"
          description: "Collection name for organizing memorized content."
        metadata:
          type: object
          description: "Additional metadata to associate with the content (e.g., source, topic, timestamp)."
      required:
        - content

  # Knowledge Base - Search
  - name: "kb_search"
    description: "Retrieves and searches previously memorized information from the knowledge base using semantic and keyword search. Use this when the user wants to 'recall', 'retrieve', 'search for', 'find', or asks 'what do you know about', 'what did I tell you about', or 'do you remember'. Examples: '¿Qué sabes sobre...?', '¿Recuerdas...?', 'Busca información sobre...', 'What did I tell you about...'."
    command: "python3"
    args: ["/app/tools/knowledge_base/main.py", "search"]
    timeout: "60s"
    input_schema:
      type: object
      properties:
        query:
          type: string
          description: "Search query"
        collection:
          type: string
          default: "default"
          description: "Collection to search in"
        top_k:
          type: integer
          default: 5
          description: "Number of results to return"
        search_type:
          type: string
          enum: ["semantic", "keyword", "hybrid"]
          default: "hybrid"
          description: "Type of search to perform"
      required:
        - query
