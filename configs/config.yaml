server:
  host: "0.0.0.0"
  port: 8080
  name: "mcp-orchestrator"
  # base_url: Public-facing URL for SSE clients to send messages (e.g., http://localhost:8080).
  # Required for SSE transport (/sse, /message endpoints).
  # In Docker, override via environment: BASE_URL=http://mcp-orchestrator:8080
  # Examples:
  #   Local dev:  http://localhost:8080
  #   Docker:     http://mcp-orchestrator:8080
  #   Production: https://mcp.example.com
  base_url: "${BASE_URL:-http://localhost:8080}"
  rate_limit_rps: 10
  rate_limit_burst: 20
  # allowed_origins: CORS origins allowed to access MCP endpoints (/mcp, /sse, /message).
  # If omitted or empty, allows all origins (*).
  # Use a list of specific origins for production to prevent DNS rebinding attacks:
  # allowed_origins:
  #   - "http://localhost:3000"
  #   - "https://lobe-chat.mycompany.com"
  #   - "https://another-client.example.com"

execution:
  default_timeout: "60s"
  working_dir: "/data"
  environment:
    LLM_API_URL: "${LLM_API_URL:-http://localhost:11434}"
    LLM_MODEL: "${LLM_MODEL:-llama3}"
    DATABASE_URL: "${DATABASE_URL:-postgresql://mcp:mcp@localhost:5432/knowledge}"
    DB_POOL_MIN: "2"
    DB_POOL_MAX: "10"
    REDIS_URL: "${REDIS_URL:-redis://localhost:6379/0}"
    LLM_CACHE_TTL: "3600"
    PYTHONUNBUFFERED: "1"

tools:
  # Echo tool for testing
  - name: "echo"
    description: "Simply repeats the exact text provided. Exclusively for debugging or explicit text repetition, NOT for memorizing or storing information."
    command: "python3"
    args: ["/app/tools/echo/main.py"]
    timeout: "10s"
    input_schema:
      type: object
      properties:
        text:
          type: string
          description: "Text to echo back"
      required:
        - text

  # PDF Report Generation
  - name: "generate_report"
    description: "Generate professional PDF reports with company branding. Use when user asks (EN): create report, generate PDF, make a report, export to PDF, create document, make summary, write invoice. (ES): crear informe, generar PDF, hacer reporte, exportar a PDF, crear documento, redactar acta, hacer resumen. Supports: incident, meeting, audit, executive_summary, formal_report, corporate_email, llm_response (markdown). Returns PDF base64 + download URL."
    command: "python3"
    args: ["/app/tools/pdf_reports/main.py"]
    timeout: "120s"
    input_schema:
      type: object
      properties:
        report_type:
          type: string
          enum: ["incident", "meeting", "audit", "executive_summary", "formal_report", "corporate_email", "llm_response"]
          description: "Type of report. Use 'llm_response' for AI-generated markdown content, 'executive_summary' for business summaries, 'formal_report' for formal documents."
        data:
          type: object
          description: "Report data object. For llm_response: {title, content (markdown), author, logo_url}. For others: see tool documentation."
        output_path:
          type: string
          description: "Optional output path for the PDF file"
      required:
        - report_type
        - data

  # Data Analysis
  - name: "analyze_data"
    description: "Analyze Excel/CSV data files with Python/Pandas. Use when user asks (EN): analyze file, process spreadsheet, calculate totals, generate charts, show trends, sales data, financial data, statistics. (ES): analizar archivo Excel, procesar hoja de cálculo, calcular totales, generar gráficos, mostrar tendencias, datos de ventas, estadísticas, crear visualización. Returns: text, JSON, markdown tables, or PNG chart images."
    command: "python3"
    args: ["/app/tools/data_analysis/main.py"]
    timeout: "180s"
    input_schema:
      type: object
      properties:
        file_url:
          type: string
          description: "HTTP URL to the data file (presigned S3 URL or direct download link). Supports .xlsx, .xls, .csv"
        file_name:
          type: string
          description: "Original filename with extension (e.g., sales.xlsx) - required to determine file format"
        question:
          type: string
          description: "What to do with the data: 'calculate total sales', 'average price by category', 'show top 10 products', 'create bar chart of monthly revenue'"
        output_format:
          type: string
          enum: ["text", "json", "markdown", "png"]
          default: "text"
          description: "How to return results: 'text' (plain), 'json' (structured), 'markdown' (tables), 'png' (chart image)"
        __files__:
          type: array
          description: "Alternative: attach files directly in OpenWebUI. The tool will download them automatically."
          items:
            type: object
            properties:
              type:
                type: string
              url:
                type: string
              name:
                type: string
              id:
                type: string
      required:
        - question

  # Vision/OCR
  - name: "analyze_image"
    description: "Analyze images: extract text (OCR), describe what you see, detect objects/people/text. Use when user asks (EN): read image, extract text, what's in photo, describe picture, scan document, extract invoice. (ES): leer imagen, extraer texto, qué hay en esta foto, describir imagen, escanear documento, extraer datos de factura, reconocer matrícula. Supports: screenshots, photos, documents, diagrams."
    command: "python3"
    args: ["/app/tools/vision_ocr/main.py"]
    timeout: "120s"
    input_schema:
      type: object
      properties:
        image_path:
          type: string
          description: "URL or path to the image file. Supports JPEG, PNG, WebP, PDF pages"
        task:
          type: string
          enum: ["ocr", "describe", "extract_entities", "answer"]
          description: "Task type: 'ocr' (extract all text), 'describe' (natural language description), 'extract_entities' (detect specific items like names, dates, amounts), 'answer' (answer a specific question about the image)"
        question:
          type: string
          description: "Specific question for 'answer' task, or what to extract for 'extract_entities'. Example: 'What product is shown?' or 'Extract all dates and amounts'"
      required:
        - image_path
        - task

  # Knowledge Base - Ingest
  - name: "kb_ingest"
    description: "Store and memorize text content for future retrieval. Use when user says (EN): memorize, save, remember, learn, store knowledge, keep track. (ES): memoriza esto, guarda esta información, recuerda que, aprende sobre, guardar conocimiento, no olvides que. Stores content semantically for search."
    command: "python3"
    args: ["/app/tools/knowledge_base/main.py", "ingest"]
    timeout: "300s"
    input_schema:
      type: object
      properties:
        content:
          type: string
          description: "The text content to memorize and store in the knowledge base."
        collection:
          type: string
          default: "default"
          description: "Collection name for organizing memorized content."
        metadata:
          type: object
          description: "Additional metadata to associate with the content (e.g., source, topic, timestamp)."
      required:
        - content

  # Knowledge Base - Search
  - name: "kb_search"
    description: "Search previously memorized information. Use when user asks (EN): recall, retrieve, search, find, what do you know, what did I tell you, do you remember. (ES): qué sabes sobre, qué me dijiste, recuerdas, busca información, busca lo que te dije, qué tienes registrado. Searches with semantic similarity."
    command: "python3"
    args: ["/app/tools/knowledge_base/main.py", "search"]
    timeout: "60s"
    input_schema:
      type: object
      properties:
        query:
          type: string
          description: "Search query"
        collection:
          type: string
          default: "default"
          description: "Collection to search in"
        top_k:
          type: integer
          default: 5
          description: "Number of results to return"
        search_type:
          type: string
          enum: ["semantic", "keyword", "hybrid"]
          default: "hybrid"
          description: "Type of search to perform"
      required:
        - query

  # Batch Summarize - Summarize multiple documents
  - name: "batch_summarize"
    description: "(EN): Summarize multiple documents at once, create batch summaries, generate master summary of multiple files, extract key points from documents. (ES): Resumir múltiples documentos a la vez, crear resúmenes por lotes, generar resumen maestro de varios archivos, extraer puntos clave de documentos. Input: __files__ (array), summary_type (individual/master/both), focus (optional), max_length (default 500 chars). Output: summaries array + optional master summary."
    command: "python3"
    args: ["/app/tools/batch_summarize/main.py"]
    timeout: "300s"
    input_schema:
      type: object
      properties:
        __files__:
          type: array
          description: "Files to summarize"
          items:
            type: object
            properties:
              url:
                type: string
              name:
                type: string
        summary_type:
          type: string
          enum: ["individual", "master", "both"]
          default: "both"
          description: "Type of summary to generate"
        focus:
          type: string
          description: "Optional focus area for summaries"
        max_length:
          type: integer
          default: 500
          description: "Maximum length of summary in characters"
      required:
        - __files__

  # Regulation Diff - Compare two versions of documents
  - name: "regulation_diff"
    description: "(EN): Compare two versions of a document or regulation, show differences between old and new version, track changes in legal documents, analyze document revisions. (ES): Comparar dos versiones de un documento o regulación, mostrar diferencias entre versión antigua y nueva, rastrear cambios en documentos legales, analizar revisiones de documentos. Input: __files__ (exactly 2: [0]=old, [1]=new), focus (optional), output_format (markdown/structured). Output: unified diff + LLM analysis + change counts."
    command: "python3"
    args: ["/app/tools/regulation_diff/main.py"]
    timeout: "180s"
    input_schema:
      type: object
      properties:
        __files__:
          type: array
          minItems: 2
          maxItems: 2
          description: "Two files: index 0 = old version, index 1 = new version"
          items:
            type: object
            properties:
              url:
                type: string
              name:
                type: string
        focus:
          type: string
          description: "Optional focus area for analysis"
        output_format:
          type: string
          enum: ["markdown", "structured"]
          default: "markdown"
          description: "Output format for analysis"
      required:
        - __files__

  # Config Auditor - Audit configuration files for security issues
  - name: "config_auditor"
    description: "(EN): Audit configuration files for security issues, detect hardcoded secrets, find dangerous port configurations, check for debug mode, find empty required fields. (ES): Auditar archivos de configuración en busca de problemas de seguridad, detectar secretos hardcodeados, encontrar configuraciones de puertos peligrosos, verificar modo debug, buscar campos vacíos requeridos. Supports: YAML, JSON, TOML, INI, ENV. Rules: secrets, empty_required, dangerous_ports, debug_mode, hardcoded_ips. Output: findings array + security score (0-100)."
    command: "python3"
    args: ["/app/tools/config_auditor/main.py"]
    timeout: "120s"
    input_schema:
      type: object
      properties:
        __files__:
          type: array
          description: "Configuration files to audit"
          items:
            type: object
            properties:
              url:
                type: string
              name:
                type: string
        rules:
          type: array
          items:
            type: string
            enum: ["secrets", "empty_required", "dangerous_ports", "debug_mode", "hardcoded_ips"]
          description: "Rules to apply (default: all)"
        severity_filter:
          type: string
          enum: ["all", "critical", "high", "medium"]
          default: "all"
          description: "Filter findings by severity"
      required:
        - __files__

  # Document Classifier - Classify documents into categories
  - name: "document_classifier"
    description: "(EN): Classify documents into categories, identify document type, detect if document is contract/invoice/report/regulation/email/etc. (ES): Clasificar documentos en categorías, identificar tipo de documento, detectar si el documento es contrato/factura/informe/regulación/correquisitos/etc. Default categories: contract, invoice, report, regulation, technical_manual, meeting_minutes, email, form, other. Supports custom categories. Input: __files__, categories (optional), language (auto/es/en). Output: classification with confidence, justification, keywords, detected language."
    command: "python3"
    args: ["/app/tools/document_classifier/main.py"]
    timeout: "180s"
    input_schema:
      type: object
      properties:
        __files__:
          type: array
          description: "Documents to classify"
          items:
            type: object
            properties:
              url:
                type: string
              name:
                type: string
        categories:
          type: array
          items:
            type: string
          description: "Custom categories (default: predefined list)"
        language:
          type: string
          enum: ["auto", "es", "en"]
          default: "auto"
          description: "Document language detection"
      required:
        - __files__

  # Weather Forecast - AEMET
  - name: "weather_forecast"
    description: "(EN): Get comparative weather forecast from AEMET for Spanish locations. Shows temperature, sky state, precipitation probability, wind and UV index. (ES): Obtener prevision meteorologica comparativa de AEMET para localidades españolas. Muestra temperatura, estado del cielo, probabilidad de precipitacion, viento y indice UV. Input: urls (optional array of AEMET XML URLs, defaults to configured locations), max_days (optional, 1-7, default 3). Output: comparative forecast by day."
    command: "python3"
    args: ["/app/tools/weather/main.py"]
    timeout: "30s"
    input_schema:
      type: object
      properties:
        urls:
          type: array
          items:
            type: string
          description: "AEMET XML URLs (e.g., https://www.aemet.es/xml/municipios/localidad_28079.xml). If omitted, uses default locations."
        max_days:
          type: integer
          default: 3
          description: "Number of forecast days (1-7, default 3)"

  # Web Scraper - Extract content from web pages
  - name: "web_scraper"
    description: "(EN): Extract content from web pages, scrape websites, get page text, find links and images, analyze web content. Use when user asks: scrape this page, get content from URL, extract text from website, find all links on page. (ES): Extraer contenido de páginas web, hacer scraping, obtener texto de página, encontrar enlaces e imágenes, analizar contenido web."
    command: "python3"
    args: ["/app/tools/web_scraper/main.py"]
    timeout: "60s"
    input_schema:
      type: object
      properties:
        url:
          type: string
          description: "URL to scrape (must start with http:// or https://)"
        selector:
          type: string
          description: "Optional CSS selector to extract specific content"
        extract_type:
          type: string
          enum: ["text", "html", "links", "images"]
          default: "text"
          description: "What to extract: text (default), html, links, images"
      required:
        - url

  # Browser Scraper - JS-rendered pages via headless Chromium (Cloudflare, Wallapop, Milanuncios...)
  - name: "browser_scraper"
    description: "(EN): Scrape JavaScript-heavy or Cloudflare-protected pages using a real headless browser. Use when web_scraper fails (blocked, empty content, Cloudflare). Examples: Milanuncios, Wallapop, portals with anti-bot protection. (ES): Extraer contenido de páginas con JS pesado o protegidas por Cloudflare usando un navegador real. Usar cuando web_scraper falla o devuelve contenido vacío."
    command: "python3"
    args: ["/app/tools/browser_scraper/main.py"]
    timeout: "90s"
    input_schema:
      type: object
      properties:
        url:
          type: string
          description: "URL to scrape (must start with http:// or https://)"
        selector:
          type: string
          description: "Optional CSS selector to wait for and extract specific content"
        extract_type:
          type: string
          enum: ["text", "html"]
          default: "text"
          description: "What to extract: text (default) or raw html"
        wait_ms:
          type: integer
          default: 3000
          description: "Milliseconds to wait for JS rendering (default 3000)"
        max_chars:
          type: integer
          default: 5000
          description: "Maximum characters to return (default 5000)"
      required:
        - url

  # RSS Reader - Read news feeds
  - name: "rss_reader"
    description: "(EN): Read RSS news feeds, get latest headlines from multiple sources. Returns news items with title, link, date and source. Use when user asks: latest news, what's happening, news feed, headlines. (ES): Leer feeds RSS de noticias, obtener últimos titulares de múltiples fuentes."
    command: "python3"
    args: ["/app/tools/rss_reader/main.py"]
    timeout: "180s"
    input_schema:
      type: object
      properties:
        limit:
          type: integer
          default: 10
          description: "Maximum number of items to return per feed"
        feeds:
          type: array
          items:
            type: string
          description: "Optional: filter by feed names (e.g. ['TechCrunch', 'BBC News']). If omitted, fetches all feeds."
        extract:
          type: string
          enum: ["titles", "content", "full"]
          default: "titles"
          description: "What to extract: titles (default), content (summaries), full (full content if available)"

  # Canvas Diagram Generator - Create Obsidian Canvas diagrams
  - name: "canvas_diagram"
    description: "(EN): Create visual diagrams using Obsidian Canvas JSON format from text descriptions. Generates flowcharts, mind maps, process diagrams. Uses LLM if available. Output: .canvas file for Obsidian. (ES): Crear diagramas visuales usando formato JSON de Obsidian Canvas a partir de descripciones de texto."
    command: "python3"
    args: ["/app/tools/canvas_diagram/main.py"]
    timeout: "60s"
    input_schema:
      type: object
      properties:
        description:
          type: string
          description: "Text description or DSL of the diagram to create. E.g., 'Usuario -> Verificar Email -> Login -> Dashboard'"
        layout:
          type: string
          enum: ["horizontal", "vertical", "radial", "auto"]
          default: "auto"
          description: "Layout direction: horizontal, vertical, radial, or auto (automatic selection)"
        save_path:
          type: string
          description: "Optional custom path to save the .canvas file"
      required:
        - description

  # RustFS/S3 Storage - File operations with S3-compatible storage
  - name: "rustfs_storage"
    description: "(EN): Interact with RustFS/S3 storage. Upload, download, list, search, delete files and get object metadata. (ES): Interactuar con almacenamiento RustFS/S3. Subir, descargar, listar, buscar y eliminar archivos."
    command: "python3"
    args: ["/app/tools/rustfs_storage/main.py"]
    timeout: "60s"
    input_schema:
      type: object
      properties:
        operation:
          type: string
          enum: [upload, download, list, search, delete, stat]
          description: "Operation to perform"
        bucket:
          type: string
          default: "openwebui"
          description: "S3 bucket name"
        key:
          type: string
          description: "Object key (path) in the bucket"
        content:
          type: string
          description: "Base64-encoded content for upload operation"
        prefix:
          type: string
          description: "Prefix for list/search operations"
        max_keys:
          type: integer
          default: 100
          description: "Maximum number of items to return"
        expiry:
          type: integer
          default: 3600
          description: "URL expiry time in seconds for download"
      required:
        - operation




