services:
  mcp-server:
    build:
      context: ..
      dockerfile: deployments/Dockerfile
    container_name: mcp-orchestrator
    ports:
      - "8080:8080"
    environment:
      # LLM Configuration - can be overridden via .env or CLI
      LLM_API_URL: ${LLM_API_URL:-http://ollama:11434}
      LLM_MODEL: ${LLM_MODEL:-llama3}

      # Database Configuration
      DATABASE_URL: ${DATABASE_URL:-postgresql://mcp:mcp@postgres:5432/knowledge}

      # RustFS / S3 Configuration (for presigned URL download)
      RUSTFS_ENDPOINT: ${RUSTFS_ENDPOINT:-rustfs:9000}
      RUSTFS_ACCESS_KEY_ID: ${RUSTFS_ACCESS_KEY_ID:-rustfsadmin}
      RUSTFS_SECRET_ACCESS_KEY: ${RUSTFS_SECRET_ACCESS_KEY:-rustfsadmin}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-openwebui}

      # Python settings
      PYTHONUNBUFFERED: "1"
    volumes:
      # Configuration (read-only)
      - ../configs:/app/configs:ro
      # Tools (read-only, for development hot-reload)
      - ../tools:/app/tools:ro
      # Templates (read-only)
      - ../templates:/app/templates:ro
      # Data directory (read-write)
      - mcp-data:/data
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - mcp-network
      - docker_default
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 3.5G
        reservations:
          cpus: '1'
          memory: 2.5G

  # MCPO proxy: converts MCP Streamable HTTP -> OpenAPI for OpenWebUI
  mcpo:
    image: ghcr.io/open-webui/mcpo:main
    container_name: mcpo-proxy
    ports:
      - "8001:8000"
    command: ["--port", "8000", "--server-type", "streamable-http", "--", "http://mcp-orchestrator:8080/mcp"]
    depends_on:
      mcp-server:
        condition: service_healthy
    networks:
      - mcp-network
      - docker_default
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1.2G
        reservations:
          cpus: '0.5'
          memory: 800M

  postgres:
    image: pgvector/pgvector:pg16
    container_name: mcp-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mcp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mcp}
      POSTGRES_DB: ${POSTGRES_DB:-knowledge}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - mcp-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mcp -d knowledge"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2.5G
        reservations:
          cpus: '1'
          memory: 1.5G

  rustfs:
    image: rustfs/rustfs:latest
    container_name: rustfs
    ports:
      - "9000:9000"
    environment:
      RUSTFS_ACCESS_KEY_ID: ${RUSTFS_ACCESS_KEY_ID:-rustfsadmin}
      RUSTFS_SECRET_ACCESS_KEY: ${RUSTFS_SECRET_ACCESS_KEY:-rustfsadmin}
    volumes:
      - rustfs-data:/data
    networks:
      - mcp-network
      - docker_default
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M

networks:
  mcp-network:
    driver: bridge
  docker_default:
    driver: bridge
    external: true

volumes:
  mcp-data:
    driver: local
  postgres-data:
    driver: local
  rustfs-data:
    driver: local
